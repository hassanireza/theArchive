<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Task board preview">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf5"/>
      <stop offset="100%" stop-color="#fdf7ea"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="560" rx="24" fill="#f5f0e8"/>
  <rect x="1" y="1" width="998" height="558" rx="23" fill="none" stroke="#e0d5c0" stroke-width="2"/>

  <g font-family="Georgia, 'Playfair Display', serif" fill="#1a120a">
    <text x="40" y="56" font-size="28" font-weight="700">Task Board</text>
  </g>
  <g font-family="'DM Mono', monospace" font-size="11" letter-spacing="1.5" fill="#8a7060">
    <text x="40" y="78">THE ARCHIVE / WORKSPACE</text>
  </g>

  <g transform="translate(40,110)">
    <!-- TO DO -->
    <g>
      <circle cx="8" cy="8" r="5" fill="#b8a898"/>
      <text x="22" y="13" font-family="'DM Mono', monospace" font-size="12" letter-spacing="1.5" fill="#4a3828">TO DO</text>
      <text x="150" y="13" font-family="'DM Mono', monospace" font-size="11" fill="#b8a898">03</text>

      <rect x="0" y="34" width="290" height="72" rx="14" fill="url(#card)" stroke="#e6dcc8"/>
      <text x="18" y="60" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a">Draft onboarding email</text>
      <text x="18" y="82" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Welcome sequence, copy pass</text>

      <rect x="0" y="118" width="290" height="72" rx="14" fill="url(#card)" stroke="#e6dcc8"/>
      <text x="18" y="144" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a">Audit color contrast</text>
      <text x="18" y="166" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Dark theme, WCAG AA</text>

      <rect x="0" y="202" width="290" height="72" rx="14" fill="url(#card)" stroke="#e6dcc8"/>
      <text x="18" y="228" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a">Write API docs</text>
      <text x="18" y="250" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Endpoints and payload shapes</text>
    </g>

    <!-- IN PROGRESS -->
    <g transform="translate(330,0)">
      <circle cx="8" cy="8" r="5" fill="#d4a85a"/>
      <text x="22" y="13" font-family="'DM Mono', monospace" font-size="12" letter-spacing="1.5" fill="#4a3828">IN PROGRESS</text>
      <text x="230" y="13" font-family="'DM Mono', monospace" font-size="11" fill="#b8a898">02</text>

      <rect x="0" y="34" width="290" height="72" rx="14" fill="url(#card)" stroke="#d4a85a" stroke-width="1.4"/>
      <text x="18" y="60" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a">Build FLIP animation engine</text>
      <text x="18" y="82" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Spring physics, 60fps target</text>

      <rect x="0" y="118" width="290" height="72" rx="14" fill="url(#card)" stroke="#d4a85a" stroke-width="1.4"/>
      <text x="18" y="144" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a">Wire session auth</text>
      <text x="18" y="166" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Per-user task isolation</text>
    </g>

    <!-- DONE -->
    <g transform="translate(660,0)">
      <circle cx="8" cy="8" r="5" fill="#c8702a"/>
      <text x="22" y="13" font-family="'DM Mono', monospace" font-size="12" letter-spacing="1.5" fill="#4a3828">DONE</text>
      <text x="180" y="13" font-family="'DM Mono', monospace" font-size="11" fill="#b8a898">04</text>

      <rect x="0" y="34" width="290" height="72" rx="14" fill="url(#card)" stroke="#e6dcc8" opacity="0.85"/>
      <text x="18" y="60" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a" text-decoration="line-through">Set up Django project</text>
      <text x="18" y="82" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Repo, settings, apps</text>

      <rect x="0" y="118" width="290" height="72" rx="14" fill="url(#card)" stroke="#e6dcc8" opacity="0.85"/>
      <text x="18" y="144" font-family="Verdana, 'DM Sans', sans-serif" font-size="14" fill="#1a120a" text-decoration="line-through">Design token system</text>
      <text x="18" y="166" font-family="Verdana, 'DM Sans', sans-serif" font-size="11" fill="#8a7060">Light and dark palette</text>
    </g>
  </g>

  <g transform="translate(40,420)" font-family="'DM Mono', monospace" font-size="11" fill="#b8a898">
    <line x1="0" y1="0" x2="920" y2="0" stroke="#e0d5c0"/>
    <text x="0" y="24">DRAG AND DROP · CLICK TO CYCLE · LIGHT / DARK</text>
  </g>
</svg>
