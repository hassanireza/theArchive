{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board · The Archive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{% static 'collaboration/css/style.css' %}">
</head>

<body>

<div class="logout-box">
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-danger btn-sm" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Exit
        </button>
    </form>

    <button class="btn btn-ghost" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        </svg>
    </button>
</div>

<div class="container">

    <div class="page-header">
        <div>
            <div style="font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem;">
                <span style="display:inline-block;width:24px;height:1.5px;background:var(--amber);vertical-align:middle;"></span>
                Workspace
            </div>
            <h2>Task <em style="font-style:italic;color:var(--amber);">Board</em></h2>
        </div>

        <div class="page-header-actions">
            <span style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink-4);letter-spacing:.06em;">THE ARCHIVE / v2</span>
        </div>
    </div>

    <div class="create-bar">
        <input
            id="taskInput"
            class="input"
            type="text"
            placeholder="Describe a new task…"
            autocomplete="off"
        >
        <button id="createBtn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Task
        </button>
    </div>

    <div class="board">

        <div class="column col-todo" id="col-todo">
            <div class="column-header">
                <span class="column-dot"></span>
                <h3>To Do</h3>
                <span class="column-count" id="count-todo">0</span>
            </div>
            <ul id="todo"></ul>
            <div class="empty-state" id="empty-todo">
                <span class="empty-state-icon">◻</span>
                <span class="empty-state-text">Nothing here yet</span>
            </div>
        </div>

        <div class="column col-inprog" id="col-inprog">
            <div class="column-header">
                <span class="column-dot"></span>
                <h3>In Progress</h3>
                <span class="column-count" id="count-inprog">0</span>
            </div>
            <ul id="in_progress"></ul>
            <div class="empty-state" id="empty-inprog">
                <span class="empty-state-icon">◈</span>
                <span class="empty-state-text">Drag tasks here</span>
            </div>
        </div>

        <div class="column col-done" id="col-done">
            <div class="column-header">
                <span class="column-dot"></span>
                <h3>Done</h3>
                <span class="column-count" id="count-done">0</span>
            </div>
            <ul id="done"></ul>
            <div class="empty-state" id="empty-done">
                <span class="empty-state-icon">◉</span>
                <span class="empty-state-text">Completed tasks appear here</span>
            </div>
        </div>

    </div>

</div>

<script src="{% static 'collaboration/js/tasks.js' %}"></script>

</body>
</html>
